name: Check generated Codex edition

# Anti-drift guard: plugins/addison-codex is GENERATED from plugins/addison-claude.
# This regenerates it and fails if the committed output differs — so a change to the source
# that wasn't rebuilt, or a hand-edit of the generated dir, can never merge.
# One source of truth (plugins/addison-claude), enforced.

on:
  pull_request:
  push:
    branches: [main]

jobs:
  no-drift:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Regenerate the Codex edition
        run: |
          ./build-codex.sh

      - name: Fail if generated editions drift from source
        run: |
          # Ignore build byproducts that aren't committed.
          find plugins -name "__pycache__" -type d -prune -exec rm -rf {} + 2>/dev/null || true
          if ! git diff --quiet; then
            echo "::error::The generated Codex edition is out of sync with plugins/addison-claude."
            echo "Run ./build-codex.sh, then commit the result."
            git --no-pager diff --stat
            exit 1
          fi
          echo "Generated Codex edition matches source."
