name: Check generated editions

# Anti-drift guard: plugins/addison-claude-internal and plugins/addison-codex are GENERATED from
# plugins/addison-claude. This regenerates them and fails if the committed output differs —
# so a change to the source that wasn't rebuilt, or a hand-edit of a generated dir,
# can never merge. One source of truth, enforced.

on:
  pull_request:
  push:
    branches: [main]

jobs:
  no-drift:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Regenerate all editions
        run: |
          ./build-editions.sh
          ./build-codex.sh

      - name: Fail if generated editions drift from source
        run: |
          # Ignore build byproducts that aren't committed.
          find plugins -name "__pycache__" -type d -prune -exec rm -rf {} + 2>/dev/null || true
          if ! git diff --quiet; then
            echo "::error::Generated editions are out of sync with plugins/addison-claude."
            echo "Run ./build-editions.sh and ./build-codex.sh, then commit the result."
            git --no-pager diff --stat
            exit 1
          fi
          echo "Generated editions match source."
